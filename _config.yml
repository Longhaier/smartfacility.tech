# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html

# Site
title: Smart Facility
subtitle: 'Industrial Energy & Smart Factory Blog'
description: 'Expert insights on industrial energy saving, smart factory technologies, and facility management'
keywords: 'industrial energy, smart factory, energy saving, facility management, IoT'
author: Smart Facility
language: en
timezone: 'UTC'

# URL
url: https://smartfacility.tech
permalink: :year/:month/:day/:title/
permalink_defaults:

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude
include:
exclude:
ignore:

# Theme
theme: butterfly

# Deployment
deploy:
  type: git
  repo: git@github.com:Longhaier/smartfacility.tech.git
  branch: main
  message: "Site updated: {{ now('YYYY-MM-DD HH:mm:ss') }}"

# Sitemap
sitemap:
  path: sitemap.xml

# Search
searchdb:
  path: search.xml
  field: post
  format: html
  limit: 10000
